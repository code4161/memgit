name: Publish to PyPI

on:
  push:
    tags:
      - "v*"          # triggers on v0.1.0, v0.2.0, etc.

permissions:
  id-token: write    # required for trusted publishing (no API key needed)

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi   # create this environment in repo Settings → Environments

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
        # Uses OIDC trusted publishing — no API token needed.
        # Set up at: https://pypi.org/manage/account/publishing/
        # Publisher: GitHub  Repo: code4161/memgit  Workflow: publish.yml  Env: pypi
